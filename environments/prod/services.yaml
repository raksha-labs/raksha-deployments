# Image tags in this file MUST be SHA-prefixed (e.g., sha256-abc123...@sha256:...)
# or a unique immutable semver tag — never use 'latest', 'prod-approved', or any
# mutable floating tag. Mutable tags make deploys non-deterministic.
# Update tags using: ./scripts/promote-service.sh <service> <sha-tag>
version: 1
environment: prod
services:
  portal-backend:
    image_tag: prod-approved
    desired_count: 1
    strategy: rolling
    config_profile: prod

  portal:
    image_tag: prod-approved
    desired_count: 1
    strategy: rolling
    config_profile: prod

  admin:
    image_tag: prod-approved
    desired_count: 0
    strategy: rolling
    config_profile: prod

  rule-control-api:
    image_tag: prod-approved
    desired_count: 1
    strategy: rolling
    config_profile: prod

  # Cost-optimized prod baseline: one task per service. This minimizes
  # Fargate spend but does not provide HA during deploys or task failures.
  engine:
    image_tag: prod-approved
    desired_count: 1
    strategy: rolling
    config_profile: prod

  alert-control-api:
    image_tag: prod-approved
    desired_count: 1
    strategy: rolling
    config_profile: prod

  notifier-runtime:
    image_tag: prod-approved
    desired_count: 1
    strategy: rolling
    config_profile: prod

  stream-control-api:
    image_tag: prod-approved
    desired_count: 1
    strategy: rolling
    config_profile: prod

  ingestion-gateway:
    image_tag: prod-approved
    desired_count: 1
    strategy: rolling
    config_profile: prod

  simlab-api:
    image_tag: prod-approved
    desired_count: 0
    strategy: rolling
    config_profile: prod

  agent-api:
    image_tag: prod-approved
    desired_count: 0
    strategy: rolling
    config_profile: prod

  risk-monitor-api:
    image_tag: prod-approved
    desired_count: 1
    strategy: rolling
    config_profile: prod

  risk-monitor-ui:
    image_tag: prod-approved
    desired_count: 1
    strategy: rolling
    config_profile: prod
