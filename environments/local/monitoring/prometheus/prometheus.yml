global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: raksha-engine
    static_configs:
      - targets: ["engine:9090"]
    metrics_path: /metrics

  - job_name: raksha-ingestion-gateway
    static_configs:
      - targets: ["ingestion-gateway:9090"]
    metrics_path: /metrics

  - job_name: raksha-notifier-gateway
    static_configs:
      - targets: ["notifier-runtime:9090"]
    metrics_path: /metrics
