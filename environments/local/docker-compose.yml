# =========================================================================
# Raksha Labs local stack (post bounded-context split, 2026-04-16)
# =========================================================================
# Single-command bring-up of the full system:
#
#   postgres            shared instance, 4 DBs (portal, engine, notifier,
#                       gateway). Each DB is owned by exactly one repo.
#   redis               Streams transport for events + alerts.
#   minio + minio-init  cold archive for ingestion-gateway envelopes.
#
#   ── simulation context (raksha-simlab/) ────────────────────────────
#   simlab-api          Go API: scenario catalog, bundle import, run
#                       orchestration, and result inspection.
#
#   ── platform context (raksha-portal/) ──────────────────────────────
#   portal-backend      Shared platform API (NestJS) for both portal and
#                       admin UIs; also proxies detection + delivery.
#   portal              customer Next.js UI (BFF → portal-backend).
#   admin               internal Next.js UI (BFF → portal-backend).
#
#   ── detection context (raksha-engine/) ─────────────────────────────
#   rule-control-api    Go CRUD: patterns + versions + snapshots.
#   engine              Rust runtime: long-polls rule-control-api,
#                       compiles DSL, emits alerts onto redis.
#
#   ── delivery context (raksha-notifier-gateway/) ────────────────────
#   alert-control-api   Go CRUD: alerts + receivers + routes + deliveries.
#   notifier-runtime    Rust: consumes alert.fired from redis, dispatches
#                       to channels, POSTs occurrences + delivery attempts
#                       back to alert-control-api.
#
#   ── ingestion context (raksha-ingestion-gateway/) ──────────────────
#   ingestion-gateway   Rust: connects to data sources, normalizes to
#                       UnifiedEventV1, publishes to redis.
#
#   ── ai agents context (raksha-ai-agents/) ──────────────────────────
#   agent-api           Go: tenant-scoped AI agent runtime. v0 ships the
#                       SimLab Scenario Agent (Claude-backed) which calls
#                       simlab-api + rule-control-api via a curated tool
#                       catalogue.
#
# Build contexts use `../../..` (raksha-labs/) so per-repo Cargo path
# dependencies (e.g. raksha-engine → raksha-contracts) resolve.
# =========================================================================

name: raksha-local

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: raksha
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-raksha}
      POSTGRES_DB: raksha_portal
      POSTGRES_INITDB_ARGS: --auth-local=scram-sha-256 --auth-host=scram-sha-256
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
      - ../../../raksha-portal/db/schema:/schemas/portal:ro
      - ../../../raksha-engine/db/control/schema.sql:/schemas/engine/schema.sql:ro
      - ../../../raksha-notifier-gateway/db/control/schema.sql:/schemas/notifier/schema.sql:ro
      - ../../../raksha-ingestion-gateway/sql/schema.sql:/schemas/gateway/schema.sql:ro
      - ../../../raksha-ingestion-gateway/db/control/schema.sql:/schemas/gateway-control/schema.sql:ro
      - ../../../raksha-simlab/db/control/schema.sql:/schemas/simlab/schema.sql:ro
      - ../../../raksha-ai-agents/db/schema:/schemas/ai:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raksha -d raksha_portal"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: raksha
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-rakshadevsecret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 raksha rakshadevsecret &&
      mc mb --ignore-existing local/raksha-events &&
      echo '{\"Rules\":[{\"ID\":\"raksha-events-7d\",\"Status\":\"Enabled\",\"Filter\":{\"Prefix\":\"events/\"},\"Expiration\":{\"Days\":7}}]}' > /tmp/lc.json &&
      mc ilm import local/raksha-events < /tmp/lc.json || true &&
      echo 'minio init complete'
      "
    restart: "no"

  # ── Detection context ───────────────────────────────────────────────

  rule-control-api:
    build:
      context: ../../../raksha-engine
      dockerfile: apps/rule-control-api/Dockerfile
    environment:
      RULE_CONTROL_LISTEN_ADDR: ":8082"
      RULE_CONTROL_DATABASE_URL: postgres://raksha:raksha@postgres:5432/raksha_engine?sslmode=disable
      RULE_CONTROL_INTERNAL_PEER_TOKEN: ${PEER_TOKEN_ENGINE:-dev-peer-token-engine}
      RULE_CONTROL_WATCH_TIMEOUT_SECS: "25"
    ports:
      - "8085:8082"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8082/healthz"]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 15s

  engine:
    build:
      context: ../../..
      dockerfile: raksha-deployments/environments/local/dockerfiles/engine.Dockerfile
    command: ["/app/config.toml"]
    environment:
      RUST_LOG: info
      RAKSHA_CONFIG_SOURCE__ENDPOINT: http://rule-control-api:8082
      RAKSHA_CONFIG_SOURCE__TENANT_IDS: "00000000-0000-0000-0000-ffffffffffff"
      RAKSHA_CONFIG_SOURCE__PEER_TOKEN: dev-peer-token-engine
      RAKSHA_CONFIG_SOURCE__VERSION_STORE_PATH: /data/version-store
      RAKSHA_CONFIG_SOURCE__WATCH_TIMEOUT_SECS: "25"
      RAKSHA_SOURCE__REDIS__URL: redis://redis:6379
      RAKSHA_SINK__REDIS__URL: redis://redis:6379
    volumes:
      - ./configs/engine.toml:/app/config.toml:ro
      - engine-data:/data
    ports:
      - "9091:9090"
    depends_on:
      redis:
        condition: service_healthy
      rule-control-api:
        condition: service_healthy
    restart: unless-stopped

  # ── Delivery context ────────────────────────────────────────────────

  alert-control-api:
    build:
      context: ../../../raksha-notifier-gateway
      dockerfile: apps/alert-control-api/Dockerfile
    environment:
      ALERT_CONTROL_LISTEN_ADDR: ":8083"
      ALERT_CONTROL_DATABASE_URL: postgres://raksha:raksha@postgres:5432/raksha_notifier?sslmode=disable
      ALERT_CONTROL_INTERNAL_PEER_TOKEN: ${PEER_TOKEN_NOTIFIER_GATEWAY:-dev-peer-token-notifier-gateway}
      ALERT_CONTROL_WATCH_TIMEOUT_SECS: "25"
      # Fixture-rendered receiver test path: alert-control-api proxies test
      # requests with an inline alert payload to notifier-runtime. Internal
      # to the docker network — the runtime binds 0.0.0.0:9094 with no host
      # port mapping. Token must match NOTIFIER_INTERNAL_HTTP_PEER_TOKEN
      # on the notifier-runtime service.
      NOTIFIER_RUNTIME_INTERNAL_URL: http://notifier-runtime:9094
      NOTIFIER_RUNTIME_PEER_TOKEN: dev-peer-token-notifier-gateway
    ports:
      - "8086:8083"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8083/healthz"]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 15s

  notifier-runtime:
    build:
      context: ../../..
      dockerfile: raksha-deployments/environments/local/dockerfiles/notifier-gateway.Dockerfile
    environment:
      NODE_ENV: development
      RUST_LOG: info
      REDIS_URL: redis://redis:6379
      NOTIFIER_CONFIG_SOURCE_ENDPOINT: http://alert-control-api:8083
      NOTIFIER_TENANT_IDS: "00000000-0000-0000-0000-ffffffffffff,00000000-0000-0000-0000-000000000001"
      ALERT_CONTROL_PEER_TOKEN: dev-peer-token-notifier-gateway
      AUTH_INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-service-token-local}
      NOTIFIER_VERSION_STORE_PATH: /data/version-store
      HEALTH_CHECK_PORT: "8080"
      # Internal HTTP surface for fixture-rendered receiver tests.
      # Bind on all interfaces so alert-control-api (on the docker network)
      # can reach it. NOT exposed via a host port mapping below — internal
      # to the docker network only. Token must match the value passed in
      # NOTIFIER_RUNTIME_PEER_TOKEN on alert-control-api.
      NOTIFIER_INTERNAL_HTTP_ENABLED: "true"
      NOTIFIER_INTERNAL_HTTP_BIND_ADDRESS: "0.0.0.0:9094"
      NOTIFIER_INTERNAL_HTTP_PEER_TOKEN: dev-peer-token-notifier-gateway
      WORKBENCH_RECEIVER_BASE_URL: http://portal-backend:3001/v1/internal/receivers
      RAKSHA_WEB_PORTAL_URL: http://localhost:3000
    volumes:
      - ./configs/notifier-runtime.toml:/app/config.toml:ro
      - notifier-data:/data
    ports:
      - "8082:8080"
      - "9093:9090"
    depends_on:
      redis:
        condition: service_healthy
      alert-control-api:
        condition: service_healthy
    restart: unless-stopped

  # ── Ingestion context ───────────────────────────────────────────────

  stream-control-api:
    build:
      context: ../../..
      dockerfile: raksha-ingestion-gateway/apps/stream-control-api/Dockerfile
    environment:
      STREAM_CONTROL_LISTEN_ADDR: ":8081"
      STREAM_CONTROL_DATABASE_URL: postgres://raksha:raksha@postgres:5432/raksha_gateway?sslmode=disable
      # Evidence fetch: reads source_envelopes from the hot-tier raw DB.
      STREAM_CONTROL_RAW_DATABASE_URL: postgres://raksha:raksha@postgres:5432/raksha_gateway_raw?sslmode=disable
      STREAM_CONTROL_INTERNAL_PEER_TOKEN: dev-peer-token-event-gateway
      STREAM_CONTROL_SIM_REDIS_URL: redis://redis:6379
    ports:
      - "8087:8081"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8081/healthz"]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 15s

  ingestion-gateway:
    build:
      context: ../../..
      dockerfile: raksha-deployments/environments/local/dockerfiles/event-gateway.Dockerfile
      target: gateway
    command: ["/app/config.toml"]
    environment:
      RUST_LOG: info
      AWS_ACCESS_KEY_ID: raksha
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-rakshadevsecret}
      AWS_REGION: us-east-1
      AWS_ENDPOINT_URL_S3: http://minio:9000
      AWS_ENDPOINT_URL: http://minio:9000
    volumes:
      - ./configs/event-gateway.toml:/app/config.toml:ro
    ports:
      - "8080:8080"
      - "9092:9090"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Simulation context ──────────────────────────────────────────────

  simlab-db-init:
    image: postgres:16-alpine
    environment:
      PGPASSWORD: raksha
    volumes:
      - ../../../raksha-simlab/db/control/schema.sql:/schemas/simlab/schema.sql:ro
    entrypoint: >
      /bin/sh -c "
      set -e &&
      until pg_isready -h postgres -U raksha -d postgres; do sleep 1; done &&
      psql -h postgres -U raksha -d postgres -tc \"SELECT 1 FROM pg_database WHERE datname = 'raksha_simlab'\" | grep -q 1 ||
      psql -h postgres -U raksha -d postgres -c \"CREATE DATABASE raksha_simlab OWNER raksha\" &&
      psql -h postgres -U raksha -d raksha_simlab -f /schemas/simlab/schema.sql &&
      echo 'simlab db init complete'
      "
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  simlab-api:
    build:
      context: ../../../raksha-simlab
      dockerfile: apps/simlab-api/Dockerfile
    environment:
      SIMLAB_LISTEN_ADDR: ":8084"
      SIMLAB_DATABASE_URL: postgres://raksha:raksha@postgres:5432/raksha_simlab?sslmode=disable
      SIMLAB_BUNDLE_ROOTS: /bundles/platform
      SIMLAB_BUNDLE_STORE_DIR: /data/bundles
      SIMLAB_INTERNAL_PEER_TOKEN: dev-peer-token-simlab
      SIMLAB_INGESTION_SIM_BASE_URL: http://stream-control-api:8081
      SIMLAB_INGESTION_SIM_PEER_TOKEN: dev-peer-token-event-gateway
      SIMLAB_RULE_CONTROL_BASE_URL: http://rule-control-api:8082
      SIMLAB_RULE_CONTROL_PEER_TOKEN: dev-peer-token-engine
      SIMLAB_NOTIFIER_BASE_URL: http://alert-control-api:8083
      SIMLAB_NOTIFIER_PEER_TOKEN: dev-peer-token-notifier-gateway
    volumes:
      - ../../../raksha-engine/apps/engine/scenario-bundles:/bundles/platform:ro
      - simlab-data:/data
    ports:
      - "8084:8084"
    depends_on:
      stream-control-api:
        condition: service_healthy
      alert-control-api:
        condition: service_healthy
      simlab-db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8084/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 15s
    restart: unless-stopped

  # ── AI agents context (raksha-ai-agents/) ─────────────────────────
  # Tenant-scoped AI agent runtime. v0 ships the SimLab Scenario Agent
  # which orchestrates simlab-api + rule-control-api via a curated tool
  # catalogue. Owns the `ai.*` schema in raksha_ai.

  ai-db-init:
    image: postgres:16-alpine
    environment:
      PGPASSWORD: raksha
    volumes:
      - ../../../raksha-ai-agents/db/schema:/schemas/ai:ro
    entrypoint: >
      /bin/sh -c "
      set -e &&
      until pg_isready -h postgres -U raksha -d postgres; do sleep 1; done &&
      psql -h postgres -U raksha -d postgres -tc \"SELECT 1 FROM pg_database WHERE datname = 'raksha_ai'\" | grep -q 1 ||
      psql -h postgres -U raksha -d postgres -c \"CREATE DATABASE raksha_ai OWNER raksha\" &&
      psql -h postgres -U raksha -d raksha_ai -f /schemas/ai/0001_init.sql &&
      psql -h postgres -U raksha -d raksha_ai -f /schemas/ai/seed_dev.sql &&
      echo 'ai db init complete'
      "
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  agent-api:
    build:
      context: ../../../raksha-ai-agents
      dockerfile: Dockerfile
    environment:
      BIND_ADDR: ":8090"
      DATABASE_URL: postgres://raksha:raksha@postgres:5432/raksha_ai?sslmode=disable
      # 32-byte base64 KEK for AES-GCM provider-key sealing (DEV ONLY).
      AI_KEK_BASE64: ${AI_KEK_BASE64:-cmFrc2hhLWxvY2FsLWRldi1rZWstMzItYnl0ZXMhISE=}
      EGRESS_ALLOWLIST: ${AI_EGRESS_ALLOWLIST:-api.anthropic.com,simlab-api,rule-control-api,alert-control-api}
      SIMLAB_BASE_URL: http://simlab-api:8084
      SIMLAB_PEER_TOKEN: ${PEER_TOKEN_SIMLAB:-dev-peer-token-simlab}
      RULE_CONTROL_BASE_URL: http://rule-control-api:8082
      RULE_CONTROL_PEER_TOKEN: ${PEER_TOKEN_ENGINE:-dev-peer-token-engine}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      SERVICE_TOKEN: ${PEER_TOKEN_AI_AGENTS:-dev-peer-token-ai-agents}
      ADMIN_PEER_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-service-token-local}
      RAKSHA_LOG_LEVEL: ${RAKSHA_LOG_LEVEL:-info}
      DEV_SKIP_PERIMETER: "true"
    ports:
      - "8090:8090"
    depends_on:
      ai-db-init:
        condition: service_completed_successfully
      simlab-api:
        condition: service_healthy
      rule-control-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8090/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 15s
    restart: unless-stopped

  # ── Platform context ────────────────────────────────────────────────

  portal-backend:
    build:
      context: ../../..
      dockerfile: raksha-deployments/environments/local/dockerfiles/raksha-portal.Dockerfile
      target: backend
    environment:
      NODE_ENV: development
      BACKEND_PORT: 3001
      BACKEND_HOST: 0.0.0.0
      DATABASE_URL: postgres://raksha:raksha@postgres:5432/raksha_portal
      DATABASE_POOL_SIZE: 10
      CORS_ORIGINS: http://localhost:3000,http://localhost:3002
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-service-token-local}
      PEER_TOKEN_ENGINE: ${PEER_TOKEN_ENGINE:-dev-peer-token-engine}
      PEER_TOKEN_NOTIFIER_GATEWAY: ${PEER_TOKEN_NOTIFIER_GATEWAY:-dev-peer-token-notifier-gateway}
      PEER_TOKEN_EVENT_GATEWAY: ${PEER_TOKEN_EVENT_GATEWAY:-dev-peer-token-event-gateway}
      PEER_TOKEN_SIMLAB: ${PEER_TOKEN_SIMLAB:-dev-peer-token-simlab}
      ENGINE_BASE_URL: http://rule-control-api:8082
      NOTIFIER_BASE_URL: http://alert-control-api:8083
      EVENT_GATEWAY_BASE_URL: http://ingestion-gateway:8080
      SIMLAB_BASE_URL: http://simlab-api:8084
      # stream-control-api is the Go CRUD surface of raksha-ingestion-gateway
      # (sibling of ingestion-gateway the Rust runtime). ingestion-proxy
      # in portal-backend uses this URL for datasource + stream CRUD.
      STREAM_CONTROL_BASE_URL: http://stream-control-api:8081
      # agent-api: tenant-scoped AI agent runtime; ai-proxy in portal-backend
      # forwards /v1/api/ai/* and /v1/api/admin/ai/* to this URL.
      AI_AGENTS_BASE_URL: http://agent-api:8090
      AI_AGENTS_SERVICE_TOKEN: ${PEER_TOKEN_AI_AGENTS:-dev-peer-token-ai-agents}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      rule-control-api:
        condition: service_healthy
      alert-control-api:
        condition: service_healthy
      stream-control-api:
        condition: service_healthy
      simlab-api:
        condition: service_healthy
      agent-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3001/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 30s

  portal:
    build:
      context: ../../..
      dockerfile: raksha-deployments/environments/local/dockerfiles/raksha-portal.Dockerfile
      target: portal
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:3001
    environment:
      RAKSHA_WEB_SESSION_SECRET: ${RAKSHA_WEB_SESSION_SECRET:-raksha-local-dev-session-secret-32chars}
      RAKSHA_DEV_AUTOLOGIN: "false"
      RAKSHA_WEB_LOCAL_LOGIN_ENABLED: "true"
      RAKSHA_WEB_SEEDED_LOGIN_FALLBACK_ENABLED: "true"
      RAKSHA_WEB_SECURE_COOKIES: "false"
      API_SERVICE_URL: http://portal-backend:3001
      CONTROL_SERVICE_URL: http://portal-backend:3001
      LAB_SERVICE_URL: http://simlab-api:8084
      SIMLAB_BASE_URL: http://simlab-api:8084
      PEER_TOKEN_SIMLAB: ${PEER_TOKEN_SIMLAB:-dev-peer-token-simlab}
      RAKSHA_API_KEY: ${INTERNAL_SERVICE_TOKEN:-dev-service-token-local}
      AUTH_INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-service-token-local}
    ports:
      - "3000:3000"
    depends_on:
      portal-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000 >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  admin:
    build:
      context: ../../..
      dockerfile: raksha-deployments/environments/local/dockerfiles/raksha-portal.Dockerfile
      target: admin
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:3001
    environment:
      RAKSHA_ADMIN_SESSION_SECRET: ${RAKSHA_ADMIN_SESSION_SECRET:-raksha-local-admin-session-secret-32chars}
      RAKSHA_ADMIN_DEV_AUTOLOGIN: "false"
      RAKSHA_ADMIN_LOCAL_LOGIN_ENABLED: "true"
      RAKSHA_ADMIN_DEV_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-service-token-local}
      ADMIN_DEV_BEARER_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-service-token-local}
      RAKSHA_ADMIN_SECURE_COOKIES: "false"
      ADMIN_API_BASE_URL: http://portal-backend:3001
      RAKSHA_API_KEY: ${INTERNAL_SERVICE_TOKEN:-dev-service-token-local}
      AUTH_INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-service-token-local}
    ports:
      - "3002:3002"
    depends_on:
      portal-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3002 >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 30s
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  miniodata:
  engine-data:
  notifier-data:
  simlab-data:
