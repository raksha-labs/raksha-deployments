# Engine configuration inside the local-stack docker network.
# All key values are overridden by RAKSHA_* env vars in docker-compose.

[source]
connector_type = "redis"

[source.redis]
url = "redis://:raksha-local-redis-secret@redis:6379"
stream_key = "raksha:events.00000000-0000-0000-0000-ffffffffffff.unified"
stream_keys = ["raksha:events.00000000-0000-0000-0000-ffffffffffff.unified"]
group_name = "raksha-engine"
consumer_name = "worker-0"
batch_size = 50
block_ms = 2000
max_len = 25000

[sink]
connector_type = "redis"

[sink.redis]
url = "redis://:raksha-local-redis-secret@redis:6379"
stream_key = "raksha:alerts:outbound"
max_len = 10000

[context_window]
default_ttl_secs = 300
eviction_interval_ms = 1000
max_events_per_key = 1000
max_total_live_events = 25000
max_partitions = 10000

[engine]
worker_count = 2
shutdown_timeout_secs = 10
rule_state_retention_secs = 3600
max_rule_states = 100000

[observability]
enable_http_server = true
bind_address = "0.0.0.0:9090"

# Long-poll subscriber pulls runtime snapshots from rule-control-api.
[config_source]
endpoint = "http://rule-control-api:8082"
tenant_ids = ["00000000-0000-0000-0000-ffffffffffff"]
peer_token = "dev-peer-token-engine"
version_store_path = "/data/version-store"
peer_name = "engine"
watch_timeout_secs = 25
