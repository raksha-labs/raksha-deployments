# Notifier-gateway configuration for the local-stack.
# Fields mirror NotifierConfig defaults; only deltas are explicit.

instance_id = "notifier-local"
shutdown_timeout_secs = 15

[database]
url = "postgres://raksha:raksha@postgres:5432/raksha_notifier"

[redis]
url = "redis://redis:6379"
consumer_stream = "raksha:alerts:outbound"
consumer_group = "notifier-gateway"
consumer_name = "notifier-0"
block_ms = 5000
batch_size = 100
autoclaim_min_idle_ms = 60000

[health]
enabled = true
port = 8080

[observability]
enabled = true
bind_address = "0.0.0.0:9090"
