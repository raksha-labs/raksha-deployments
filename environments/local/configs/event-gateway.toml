# ingestion-gateway configuration for the local stack.
# Leans on Rust struct defaults (every section is `#[serde(default)]`);
# only non-default fields are explicit here.

partition_tag = ""
shutdown_timeout_secs = 30

[database]
url = "postgres://raksha:raksha@postgres:5432/raksha_gateway"

[transport]
backend = "redis"
route_prefix = "raksha"

[transport.redis]
url = "redis://:raksha-local-redis-secret@redis:6379"

[health]
enabled = true
port = 8080

[observability]
enabled = true
bind_address = "0.0.0.0:9090"

[config_source]
# HTTP long-poll to stream-control-api for runtime stream snapshots.
kind = "http"
endpoint = "http://stream-control-api:8081"
tenant_id = "00000000-0000-0000-0000-ffffffffffff"
peer_token = "dev-peer-token-event-gateway-2026"
peer_name = "ingestion-gateway"
http_watch_timeout_secs = 25
http_poll_interval_secs = 5

# Cold-tier archive via MinIO (S3 API compatible). Flip enabled=false to
# disable if you don't want the archive sink spinning in local.
[archive]
enabled = true
bucket = "raksha-events"
prefix = "events"
channel_capacity = 2000

[hot_ttl]
enabled = true
retention_hours = 24
sweep_interval_secs = 600
batch_size = 1000
