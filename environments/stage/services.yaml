version: 1
environment: stage
services:
  # Stage runs a single task per service — it's pre-prod verification,
  # not a high-availability environment. Bump to 2 only when validating
  # rolling-deploy behaviour for a specific release.
  portal-backend:
    image_tag: stage-approved
    desired_count: 1
    strategy: rolling
    config_profile: stage

