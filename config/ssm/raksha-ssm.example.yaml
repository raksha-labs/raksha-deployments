# Per-environment SSM Parameter Store seed file.
#
# Copy this file to raksha-ssm.<env>.yaml (e.g. raksha-ssm.dev.yaml). Real
# files matching that pattern are gitignored — they never enter the repo.
#
# Each top-level key is the container name as it appears in ECS task
# definitions. For each container, "static" entries become SSM String
# parameters at /raksha/<env>/<container>/static/<KEY> and "secret"
# entries become SSM SecureString parameters at
# /raksha/<env>/<container>/secret/<KEY>. Each service's Terraform reads
# them via aws_ssm_parameters_by_path data sources.
#
# Apply with:
#   scripts/seed_ssm.py --env dev --file config/ssm/raksha-ssm.dev.yaml
#   scripts/seed_ssm.py --env dev --file config/ssm/raksha-ssm.dev.yaml --apply
#
# All containers are listed below. Anything you don't need yet, leave the
# block empty — the script just skips it. Hardcoded defaults baked into
# each service's Terraform (PORT, BIND_ADDR, HEALTH_CHECK_*, etc.) are NOT
# overridden by these — they merge on top.

# -- ingestion-gateway repo --------------------------------------------------

ingestion-gateway:
  static:
    REDIS_URL: "redis://raksha-redis-dev.example.cache.amazonaws.com:6379"
    ARCHIVE_BUCKET: "raksha-dev-events"
    RUST_LOG: "error"
    LOG_LEVEL: "error"
  secret: {}

stream-control-api:
  static:
    DATABASE_URL: "postgres://raksha@raksha-pg-dev.example.rds.amazonaws.com:5432/raksha_gateway"
    LOG_LEVEL: "error"
  secret:
    DATABASE_PASSWORD: "REPLACE_ME"

