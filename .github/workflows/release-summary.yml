name: Release Summary

on:
  push:
    branches:
      - main
    paths:
      - environments/**/services.yaml
      - catalog/services.yaml

permissions:
  contents: read

jobs:
  summary:
    name: Render Release Summary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Render summary
        run: python scripts/render_release_summary.py >> "$GITHUB_STEP_SUMMARY"
