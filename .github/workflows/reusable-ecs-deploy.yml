# Reusable: terraform apply + ECS force-new-deployment for a project.
#
# A "project" maps 1:1 to a repo's infra/terraform/ tree (raksha-portal,
# raksha-engine, raksha-notifier-gateway, raksha-ingestion-gateway). The
# state key is "${project-name}/${environment}/terraform.tfstate".
#
# Backend identifiers (state bucket, lock table) are read from repo vars
# (vars.TF_BACKEND_BUCKET, vars.TF_BACKEND_DYNAMODB_TABLE) — they are
# resource names, not credentials, so they are configured as GitHub
# Actions repo/org variables and inherited automatically by this reusable
# workflow without needing to be forwarded in the caller's secrets: block.
#
# Usage:
#   jobs:
#     deploy:
#       uses: raksha-labs/raksha-deployments/.github/workflows/reusable-ecs-deploy.yml@master
#       with:
#         project-name: raksha-portal
#         environment: stage
#         services: "portal-backend portal admin"
#         tf-vars: |
#           portal_backend_image_tag=${{ inputs.image_tag }}
#           portal_image_tag=${{ inputs.image_tag }}
#           admin_image_tag=${{ inputs.image_tag }}
#           vpc_id=${{ vars.RAKSHA_PORTAL_VPC_ID }}
#       secrets:
#         AWS_INFRA_ROLE_ARN: ${{ secrets.AWS_INFRA_ROLE_ARN }}

name: reusable-ecs-deploy

on:
  workflow_call:
    inputs:
      project-name:
        description: "Project key (raksha-portal, raksha-engine, …). Used in the tfstate key and the ECS cluster/service names."
        type: string
        required: true
      environment:
        description: "Target environment (test, stage, prod, …)."
        type: string
        required: true
      services:
        description: "Space-separated short names of services in this project (e.g. 'portal-backend portal admin'). Each becomes 'raksha-${name}-${environment}' for ECS update-service."
        type: string
        required: true
      cluster_name:
        description: "ECS cluster name. Defaults to '${project-name}-${environment}' for backwards compatibility; Raksha shared runtime uses 'raksha-${environment}'."
        type: string
        default: ""
      service-cluster-overrides:
        description: "Optional newline-separated service=cluster mappings used for post-apply ECS force deployments."
        type: string
        default: ""
      tf-vars:
        description: "Multi-line list of name=value, one per line, passed as -var to terraform apply."
        type: string
        default: ""
      import_resources:
        description: "Optional newline-separated Terraform import specs in address=id-or-name form. Existing AWS resources are imported before apply."
        type: string
        default: ""
      working-directory:
        type: string
        default: infra/terraform
      terraform-version:
        type: string
        default: "1.6.6"
      aws-region:
        type: string
        default: "eu-west-1"
      runs-on:
        type: string
        default: ubuntu-latest
    secrets:
      AWS_INFRA_ROLE_ARN:
        required: true
      CROSS_REPO_READ_TOKEN:
        required: false

permissions:
  id-token: write
  contents: read

jobs:
  apply:
    name: Deploy ${{ inputs.project-name }} → ${{ inputs.environment }}
    runs-on: ${{ inputs.runs-on }}

    steps:
      - name: Checkout project repo
        uses: actions/checkout@v4
        with:
          repository: raksha-labs/${{ inputs.project-name }}
          token: ${{ secrets.CROSS_REPO_READ_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_INFRA_ROLE_ARN }}
          aws-region: ${{ inputs.aws-region }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform-version }}

      - name: Verify backend config
        env:
          STATE_BUCKET: ${{ vars.TF_BACKEND_BUCKET }}
          LOCK_TABLE: ${{ vars.TF_BACKEND_DYNAMODB_TABLE }}
        run: |
          set -eu
          missing=0
          if [ -z "${STATE_BUCKET:-}" ]; then
            echo "::error::vars.TF_BACKEND_BUCKET is empty. Set it under Settings → Secrets and variables → Actions → Variables." >&2
            missing=1
          fi
          if [ -z "${LOCK_TABLE:-}" ]; then
            echo "::error::vars.TF_BACKEND_DYNAMODB_TABLE is empty. Set it under Settings → Secrets and variables → Actions → Variables." >&2
            missing=1
          fi
          [ "$missing" -eq 0 ]

      - name: Terraform init
        working-directory: ${{ inputs.working-directory }}
        run: |
          terraform init \
            -input=false \
            -reconfigure \
            -backend-config="bucket=${{ vars.TF_BACKEND_BUCKET }}" \
            -backend-config="key=${{ inputs.project-name }}/${{ inputs.environment }}/terraform.tfstate" \
            -backend-config="region=${{ inputs.aws-region }}" \
            -backend-config="dynamodb_table=${{ vars.TF_BACKEND_DYNAMODB_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform apply
        working-directory: ${{ inputs.working-directory }}
        env:
          TF_VAR_environment: ${{ inputs.environment }}
          TF_VAR_aws_region: ${{ inputs.aws-region }}
          # Route tf-vars through an env var, never inline ${{ }} into the
          # shell script. Inline substitution is raw text replacement, so
          # JSON values like {"K":"V"} have their inner double quotes
          # interpreted as bash quote toggles and the JSON is mangled
          # before our parsing loop sees it. Env vars are passed via
          # exec without shell re-parsing, so the value is preserved
          # byte-for-byte.
          TF_VARS_INPUT: ${{ inputs.tf-vars }}
          IMPORT_RESOURCES: ${{ inputs.import_resources }}
        run: |
          set -eu
          # tf-vars come in as one "name=value" per line. Export each as
          # TF_VAR_<name> rather than passing -var=, because TF_VAR_*
          # parses complex types (map/list/object) as JSON — which is the
          # natural format the GitHub vars already hold for *_static_env
          # / *_secret_env. -var= would parse values as HCL, where map
          # syntax requires `=` not `:` and JSON literals fail.
          while IFS= read -r line; do
            line="${line#"${line%%[![:space:]]*}"}"   # trim leading
            line="${line%"${line##*[![:space:]]}"}"   # trim trailing
            [ -z "$line" ] && continue
            case "$line" in
              *=*) ;;
              *)
                echo "::warning::ignoring malformed tf-vars line (no '='): $line"
                continue
                ;;
            esac
            name="${line%%=*}"
            value="${line#*=}"
            # Skip empty values — terraform falls back to the variable's declared default.
            [ -z "$value" ] && continue
            export "TF_VAR_${name}=${value}"
          done <<< "$TF_VARS_INPUT"

          resolve_vpc_id() {
            if [ -n "${TF_VAR_vpc_id:-}" ]; then
              printf '%s' "$TF_VAR_vpc_id"
              return 0
            fi
            aws ssm get-parameter \
              --name "/raksha/${{ inputs.environment }}/core/vpc_id" \
              --query 'Parameter.Value' \
              --output text
          }

          resolve_service_discovery_namespace_id() {
            if [ -n "${TF_VAR_service_discovery_namespace_id:-}" ]; then
              printf '%s' "$TF_VAR_service_discovery_namespace_id"
              return 0
            fi
            aws ssm get-parameter \
              --name "/raksha/${{ inputs.environment }}/core/service_discovery_namespace_id" \
              --query 'Parameter.Value' \
              --output text
          }

          while IFS= read -r spec; do
            spec="${spec#"${spec%%[![:space:]]*}"}"
            spec="${spec%"${spec##*[![:space:]]}"}"
            [ -z "$spec" ] && continue
            case "$spec" in
              *=*) ;;
              *)
                echo "::warning::ignoring malformed import_resources line (no '='): $spec"
                continue
                ;;
            esac

            address="${spec%%=*}"
            import_id="${spec#*=}"
            [ -z "$address" ] && continue
            [ -z "$import_id" ] && continue

            if terraform state show "$address" >/dev/null 2>&1; then
              echo "Terraform state already contains $address; skipping import."
              continue
            fi

            case "$address" in
              aws_ecr_repository.*)
                if ! aws ecr describe-repositories --repository-names "$import_id" >/dev/null 2>&1; then
                  echo "ECR repository $import_id does not exist yet; apply will create it."
                  continue
                fi
                ;;
              aws_cloudwatch_log_group.*)
                if ! aws logs describe-log-groups --log-group-name-prefix "$import_id" \
                  --query "logGroups[?logGroupName=='$import_id'] | [0].logGroupName" \
                  --output text | grep -qx "$import_id"; then
                  echo "CloudWatch log group $import_id does not exist yet; apply will create it."
                  continue
                fi
                ;;
              aws_security_group.*)
                if [ "${import_id#sg-}" = "$import_id" ]; then
                  vpc_id="$(resolve_vpc_id)"
                  resolved_id="$(aws ec2 describe-security-groups \
                    --filters "Name=vpc-id,Values=$vpc_id" "Name=group-name,Values=$import_id" \
                    --query 'SecurityGroups[0].GroupId' \
                    --output text)"
                  if [ -z "$resolved_id" ] || [ "$resolved_id" = "None" ]; then
                    echo "Security group $import_id does not exist yet; apply will create it."
                    continue
                  fi
                  import_id="$resolved_id"
                elif ! aws ec2 describe-security-groups --group-ids "$import_id" >/dev/null 2>&1; then
                  echo "Security group $import_id does not exist yet; apply will create it."
                  continue
                fi
                ;;
              aws_iam_role.*)
                if ! aws iam get-role --role-name "$import_id" >/dev/null 2>&1; then
                  echo "IAM role $import_id does not exist yet; apply will create it."
                  continue
                fi
                ;;
              aws_iam_role_policy_attachment.*)
                role_name="${import_id%%/*}"
                policy_arn="${import_id#*/}"
                if [ -z "$role_name" ] || [ -z "$policy_arn" ] || [ "$role_name" = "$policy_arn" ]; then
                  echo "::warning::ignoring malformed IAM role policy attachment import id: $import_id"
                  continue
                fi
                if ! aws iam list-attached-role-policies --role-name "$role_name" \
                  --query "AttachedPolicies[?PolicyArn=='$policy_arn'] | [0].PolicyArn" \
                  --output text | grep -qx "$policy_arn"; then
                  echo "IAM policy attachment $import_id does not exist yet; apply will create it."
                  continue
                fi
                ;;
              aws_iam_role_policy.*)
                role_name="${import_id%%:*}"
                policy_name="${import_id#*:}"
                if [ -z "$role_name" ] || [ -z "$policy_name" ] || [ "$role_name" = "$policy_name" ]; then
                  echo "::warning::ignoring malformed IAM role policy import id: $import_id"
                  continue
                fi
                if ! aws iam get-role-policy --role-name "$role_name" --policy-name "$policy_name" >/dev/null 2>&1; then
                  echo "IAM inline role policy $import_id does not exist yet; apply will create it."
                  continue
                fi
                ;;
              aws_service_discovery_service.*)
                if [ "${import_id#srv-}" = "$import_id" ]; then
                  namespace_id="$(resolve_service_discovery_namespace_id)"
                  resolved_id="$(aws servicediscovery list-services \
                    --filters "Name=NAMESPACE_ID,Values=$namespace_id,Condition=EQ" \
                    --query "Services[?Name=='$import_id'] | [0].Id" \
                    --output text)"
                  if [ -z "$resolved_id" ] || [ "$resolved_id" = "None" ]; then
                    echo "Service discovery service $import_id does not exist yet; apply will create it."
                    continue
                  fi
                  import_id="$resolved_id"
                elif ! aws servicediscovery get-service --id "$import_id" >/dev/null 2>&1; then
                  echo "Service discovery service $import_id does not exist yet; apply will create it."
                  continue
                fi
                ;;
              aws_ecs_service.*)
                cluster_name="${import_id%%/*}"
                service_name="${import_id#*/}"
                if [ -z "$cluster_name" ] || [ -z "$service_name" ] || [ "$cluster_name" = "$service_name" ]; then
                  echo "::warning::ignoring malformed ECS service import id: $import_id"
                  continue
                fi
                if ! aws ecs describe-services \
                  --cluster "$cluster_name" \
                  --services "$service_name" \
                  --query 'services[0].serviceArn' \
                  --output text | grep -q '^arn:'; then
                  echo "ECS service $import_id does not exist yet; apply will create it."
                  continue
                fi
                ;;
              aws_appautoscaling_target.*)
                service_namespace="${import_id%%/*}"
                scalable_dimension="${import_id##*/}"
                resource_id="${import_id#*/}"
                resource_id="${resource_id%/*}"
                if [ -z "$service_namespace" ] || [ -z "$resource_id" ] || [ -z "$scalable_dimension" ] || [ "$service_namespace" = "$import_id" ]; then
                  echo "::warning::ignoring malformed Application Auto Scaling target import id: $import_id"
                  continue
                fi
                if ! aws application-autoscaling describe-scalable-targets \
                  --service-namespace "$service_namespace" \
                  --resource-ids "$resource_id" \
                  --scalable-dimension "$scalable_dimension" \
                  --query 'ScalableTargets[0].ResourceId' \
                  --output text | grep -qx "$resource_id"; then
                  echo "Application Auto Scaling target $import_id does not exist yet; apply will create it."
                  continue
                fi
                ;;
              *)
                echo "::error::Unsupported import_resources address: $address" >&2
                exit 1
                ;;
            esac

            echo "Importing existing AWS resource $import_id into $address"
            terraform import -input=false "$address" "$import_id"
          done <<< "${IMPORT_RESOURCES:-}"

          terraform apply -auto-approve -input=false

      - name: Force new ECS deployments
        env:
          SERVICE_CLUSTER_OVERRIDES: ${{ inputs.service-cluster-overrides }}
        run: |
          set -eu
          CLUSTER="${{ inputs.cluster_name }}"
          if [ -z "$CLUSTER" ]; then
            CLUSTER="${{ inputs.project-name }}-${{ inputs.environment }}"
          fi

          cluster_for_service() {
            local short_name="$1"
            local line
            while IFS= read -r line; do
              line="${line#"${line%%[![:space:]]*}"}"
              line="${line%"${line##*[![:space:]]}"}"
              [ -z "$line" ] && continue
              case "$line" in
                *=*) ;;
                *) continue ;;
              esac
              if [ "${line%%=*}" = "$short_name" ]; then
                printf '%s' "${line#*=}"
                return 0
              fi
            done <<< "${SERVICE_CLUSTER_OVERRIDES:-}"
            printf '%s' "$CLUSTER"
          }

          for svc in ${{ inputs.services }}; do
            SERVICE="raksha-${svc}-${{ inputs.environment }}"
            TARGET_CLUSTER="$(cluster_for_service "$svc")"
            echo "→ Deploying $SERVICE on cluster $TARGET_CLUSTER"
            aws ecs update-service \
              --cluster "$TARGET_CLUSTER" \
              --service "$SERVICE" \
              --force-new-deployment \
              --query 'service.deployments[0].{status:status,desired:desiredCount,running:runningCount}' \
              --output table
          done
