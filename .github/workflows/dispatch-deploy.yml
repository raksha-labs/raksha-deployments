# Single dispatch entry point: pick one or more deploy groups + environment
# + optional image-tag override. This workflow looks up the catalog, then
# triggers each owning repo's deploy.yml in rollout_order. Use this when you
# want to roll selected bounded contexts instead of running each repo's deploy
# by hand.
#
# Each consumer repo's deploy.yml MUST accept three workflow_dispatch
# inputs: environment (string), image_tag (string; optional override),
# build_image (boolean).
# Triggering uses GitHub's REST API via gh.

name: Dispatch deploy (groups)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - dev
          - stage
          - prod
      deploy_all:
        description: Deploy every group in catalog rollout order
        required: true
        type: boolean
        default: false
      deploy_portal:
        description: Deploy portal
        required: true
        type: boolean
        default: false
      deploy_detection:
        description: Deploy detection (engine + rule-control)
        required: true
        type: boolean
        default: false
      deploy_delivery:
        description: Deploy delivery (notifier + alert-control)
        required: true
        type: boolean
        default: false
      deploy_ingestion:
        description: Deploy ingestion
        required: true
        type: boolean
        default: false
      deploy_simulation:
        description: Deploy simulation
        required: true
        type: boolean
        default: false
      deploy_ai_agents:
        description: Deploy AI agents
        required: true
        type: boolean
        default: false
      image_tag:
        description: Optional image tag override. Leave empty to deploy the tags recorded in environments/<env>/services.yaml.
        required: false
        type: string
        default: ""
      build_image:
        description: Build & push images first. Requires image_tag to be set.
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  dispatch:
    name: Dispatch to consumer repos
    runs-on: ubuntu-latest

    steps:
      - name: Checkout deployments
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install pyyaml
        run: pip install pyyaml

      - name: Compute repo list (from catalog, in rollout_order)
        id: repos
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import os, yaml, json
          catalog = yaml.safe_load(open("catalog/services.yaml"))
          selected_groups = set()
          if "${{ inputs.deploy_all }}" == "true":
              selected_groups = {s["deploy_group"] for s in catalog["services"]}
          else:
              mapping = {
                  "portal": "${{ inputs.deploy_portal }}",
                  "detection": "${{ inputs.deploy_detection }}",
                  "delivery": "${{ inputs.deploy_delivery }}",
                  "ingestion": "${{ inputs.deploy_ingestion }}",
                  "simulation": "${{ inputs.deploy_simulation }}",
                  "ai-agents": "${{ inputs.deploy_ai_agents }}",
              }
              selected_groups = {group for group, enabled in mapping.items() if enabled == "true"}
          if not selected_groups:
              raise SystemExit("Select at least one deploy group, or tick deploy_all.")
          services = catalog["services"]
          services = [s for s in services if s["deploy_group"] in selected_groups]
          services.sort(key=lambda s: s["rollout_order"])
          # One unique source_repo per row, preserving rollout order.
          seen, repos = set(), []
          for s in services:
              if s["source_repo"] not in seen:
                  seen.add(s["source_repo"])
                  repos.append(s["source_repo"])
          print("repos=" + json.dumps(repos))
          PY

      - name: Validate build inputs
        run: |
          set -eu
          if [ "${{ inputs.build_image }}" = "true" ] && [ -z "${{ inputs.image_tag }}" ]; then
            echo "image_tag is required when build_image=true" >&2
            exit 1
          fi

      - name: Trigger each consumer repo's deploy.yml
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_DISPATCH_TOKEN }}
        run: |
          set -eu
          repos='${{ steps.repos.outputs.repos }}'
          echo "==> dispatching deploy to: $repos"
          for repo in $(echo "$repos" | python3 -c 'import json,sys; print(" ".join(json.load(sys.stdin)))'); do
            echo "→ raksha-labs/$repo"
            gh workflow run deploy.yml \
              --repo "raksha-labs/$repo" \
              --ref master \
              -f environment='${{ inputs.environment }}' \
              -f image_tag='${{ inputs.image_tag }}' \
              -f build_image='${{ inputs.build_image }}'
          done
