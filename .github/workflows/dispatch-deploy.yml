# Single dispatch entry point: pick one or more repo-aligned components +
# environment + optional image-tag override. This workflow looks up the
# catalog, then triggers each owning repo's deploy.yml as one matrix job per
# selected component.
# Use this when you want to roll selected repos instead of running each repo's
# deploy by hand.
#
# Each consumer repo's deploy.yml MUST accept three workflow_dispatch inputs:
# environment (string), image_tag (string; optional override), build_image
# (boolean). Triggering uses GitHub's REST API via gh. This workflow waits for
# every downstream deploy run and fails if any selected repo fails. Matrix jobs
# use fail-fast=false so all selected repos report their own result.

name: Dispatch deploy (components)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - dev
          - stage
          - prod
      deploy_all:
        description: Deploy all repos in the catalog as parallel component jobs
        required: true
        type: boolean
        default: false
      deploy_portal:
        description: portal
        required: true
        type: boolean
        default: false
      deploy_engine:
        description: engine
        required: true
        type: boolean
        default: false
      deploy_notifier_gateway:
        description: notifier-gateway
        required: true
        type: boolean
        default: false
      deploy_ingestion_gateway:
        description: ingestion-gateway
        required: true
        type: boolean
        default: false
      deploy_simlab:
        description: simlab
        required: true
        type: boolean
        default: false
      deploy_ai_agents:
        description: ai-agents
        required: true
        type: boolean
        default: false
      image_tag:
        description: Optional image tag override. Leave empty to deploy the tags recorded in environments/<env>/services.yaml.
        required: false
        type: string
        default: ""
      build_image:
        description: Build & push images first. Requires image_tag to be set.
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare component list
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.repos.outputs.repos }}

    steps:
      - name: Checkout deployments
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install pyyaml
        run: pip install pyyaml

      - name: Compute repo list (from catalog, in rollout_order)
        id: repos
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import os, yaml, json
          catalog = yaml.safe_load(open("catalog/services.yaml"))
          selected_groups = set()
          if "${{ inputs.deploy_all }}" == "true":
              selected_groups = {s["deploy_group"] for s in catalog["services"]}
          else:
              mapping = {
                  "portal": "${{ inputs.deploy_portal }}",
                  "detection": "${{ inputs.deploy_engine }}",
                  "delivery": "${{ inputs.deploy_notifier_gateway }}",
                  "ingestion": "${{ inputs.deploy_ingestion_gateway }}",
                  "simulation": "${{ inputs.deploy_simlab }}",
                  "ai-agents": "${{ inputs.deploy_ai_agents }}",
              }
              selected_groups = {group for group, enabled in mapping.items() if enabled == "true"}
          if not selected_groups:
              raise SystemExit("Select at least one component repo, or tick deploy_all.")
          services = catalog["services"]
          services = [s for s in services if s["deploy_group"] in selected_groups]
          services.sort(key=lambda s: s["rollout_order"])
          # One unique source_repo per row, preserving rollout order.
          seen, repos = set(), []
          for s in services:
              if s["source_repo"] not in seen:
                  seen.add(s["source_repo"])
                  repos.append(s["source_repo"])
          print("repos=" + json.dumps(repos))
          PY

      - name: Validate build inputs
        run: |
          set -eu
          if [ "${{ inputs.build_image }}" = "true" ] && [ -z "${{ inputs.image_tag }}" ]; then
            echo "image_tag is required when build_image=true" >&2
            exit 1
          fi

      - name: Selected components
        run: |
          echo "Selected repos: ${{ steps.repos.outputs.repos }}"
          {
            echo "## Selected component deploys"
            echo
            echo '${{ steps.repos.outputs.repos }}' | python3 -c 'import json,sys; [print(f"- `{repo}`") for repo in json.load(sys.stdin)]'
          } >> "$GITHUB_STEP_SUMMARY"

  dispatch-component:
    name: Dispatch ${{ matrix.repo }}
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo: ${{ fromJson(needs.prepare.outputs.repos) }}

    steps:
      - name: Trigger downstream deploy
        id: dispatch
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail

          repo='${{ matrix.repo }}'
          mkdir -p dispatch-results

          write_dispatch_result() {
            conclusion="$1"
            run_id="${2:-}"
            url="${3:-}"
            notes="${4:-}"
            python3 - "$repo" "$conclusion" "$run_id" "$url" "$notes" > "dispatch-results/$repo.json" <<'PY'
          import json
          import sys

          repo, conclusion, run_id, url, notes = sys.argv[1:6]
          print(json.dumps({
              "repo": repo,
              "conclusion": conclusion,
              "run_id": run_id,
              "url": url,
              "notes": notes,
          }))
          PY
          }

          marker="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "Dispatching raksha-labs/$repo deploy.yml after $marker"

          if ! gh workflow run deploy.yml \
            --repo "raksha-labs/$repo" \
            --ref master \
            -f environment='${{ inputs.environment }}' \
            -f image_tag='${{ inputs.image_tag }}' \
            -f build_image='${{ inputs.build_image }}'; then
            write_dispatch_result "dispatch_failed" "" "" "Failed to trigger downstream deploy workflow"
            exit 1
          fi

          run_id=""
          run_url=""
          for _ in $(seq 1 30); do
            if ! run_json=$(
              gh run list \
                --repo "raksha-labs/$repo" \
                --workflow deploy.yml \
                --branch master \
                --event workflow_dispatch \
                --json databaseId,createdAt,url \
                --limit 20
            ); then
              echo "::warning::Failed to list deploy runs for raksha-labs/$repo; retrying."
              sleep 10
              continue
            fi
            run_id=$(printf '%s' "$run_json" | jq -r --arg marker "$marker" '[.[] | select(.createdAt >= $marker)] | sort_by(.createdAt) | .[0].databaseId // ""')
            run_url=$(printf '%s' "$run_json" | jq -r --arg marker "$marker" '[.[] | select(.createdAt >= $marker)] | sort_by(.createdAt) | .[0].url // ""')
            if [ -n "$run_id" ]; then
              break
            fi
            sleep 10
          done

          if [ -z "$run_id" ]; then
            echo "::error::Timed out waiting for raksha-labs/$repo deploy run to appear."
            write_dispatch_result "not_found" "" "" "Timed out waiting for downstream workflow run"
            exit 1
          fi

          write_dispatch_result "dispatched" "$run_id" "$run_url" ""
          {
            echo "## $repo dispatch result"
            echo
            echo "| Repo | Result | Run |"
            echo "| --- | --- | --- |"
            echo "| \`$repo\` | dispatched | [run]($run_url) |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload dispatch result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dispatch-result-${{ matrix.repo }}
          path: dispatch-results/${{ matrix.repo }}.json
          if-no-files-found: warn

  wait-component:
    name: Wait ${{ matrix.repo }}
    needs:
      - prepare
      - dispatch-component
    if: ${{ always() && needs.prepare.result == 'success' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo: ${{ fromJson(needs.prepare.outputs.repos) }}

    steps:
      - name: Download dispatch result
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: dispatch-result-${{ matrix.repo }}
          path: dispatch-results

      - name: Wait for downstream deploy
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail

          repo='${{ matrix.repo }}'
          dispatch_file="dispatch-results/$repo.json"
          mkdir -p component-results

          write_result() {
            conclusion="$1"
            url="${2:-}"
            notes="${3:-}"
            python3 - "$repo" "$conclusion" "$url" "$notes" > "component-results/$repo.json" <<'PY'
          import json
          import sys

          repo, conclusion, url, notes = sys.argv[1:5]
          print(json.dumps({
              "repo": repo,
              "conclusion": conclusion,
              "url": url,
              "notes": notes,
          }))
          PY
          }

          if [ ! -f "$dispatch_file" ]; then
            echo "::error::Missing dispatch result for raksha-labs/$repo."
            write_result "dispatch_missing" "" "No dispatch artifact was produced"
            exit 1
          fi

          dispatch_conclusion=$(jq -r '.conclusion' "$dispatch_file")
          run_id=$(jq -r '.run_id // ""' "$dispatch_file")
          run_url=$(jq -r '.url // ""' "$dispatch_file")
          dispatch_notes=$(jq -r '.notes // ""' "$dispatch_file")

          if [ "$dispatch_conclusion" != "dispatched" ]; then
            echo "::error::Deploy dispatch did not succeed for raksha-labs/$repo: $dispatch_conclusion"
            write_result "$dispatch_conclusion" "$run_url" "$dispatch_notes"
            exit 1
          fi

          echo "Waiting for raksha-labs/$repo deploy run $run_id"
          for _ in $(seq 1 240); do
            if ! run_info=$(gh api "repos/raksha-labs/$repo/actions/runs/$run_id"); then
              echo "::warning::Failed to read deploy run $run_id for raksha-labs/$repo; retrying."
              sleep 30
              continue
            fi
            status=$(printf '%s' "$run_info" | jq -r '.status')
            conclusion=$(printf '%s' "$run_info" | jq -r '.conclusion // "none"')
            run_url=$(printf '%s' "$run_info" | jq -r '.html_url')

            echo "raksha-labs/$repo deploy run $run_id: $status/$conclusion"

            if [ "$status" = "completed" ]; then
              write_result "$conclusion" "$run_url" ""
              {
                echo "## $repo deploy result"
                echo
                echo "| Repo | Result | Run |"
                echo "| --- | --- | --- |"
                echo "| \`$repo\` | $conclusion | [run]($run_url) |"
              } >> "$GITHUB_STEP_SUMMARY"

              if [ "$conclusion" != "success" ]; then
                echo "::error::Deploy failed for raksha-labs/$repo: $run_url"
                exit 1
              fi
              exit 0
            fi

            sleep 30
          done

          echo "::error::Timed out waiting for raksha-labs/$repo deploy run $run_id to complete."
          write_result "timeout" "$run_url" "Timed out waiting for downstream workflow completion"
          exit 1

      - name: Upload component result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-result-${{ matrix.repo }}
          path: component-results/${{ matrix.repo }}.json
          if-no-files-found: warn

  summary:
    name: Deployment summary
    needs:
      - prepare
      - dispatch-component
      - wait-component
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Download component results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: deploy-result-*
          path: component-results
          merge-multiple: true

      - name: Publish summary
        run: |
          set -eu
          python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path

          print("## Component deploy results")
          print()
          print("| Repo | Result | Run | Notes |")
          print("| --- | --- | --- | --- |")

          results = []
          for path in sorted(Path("component-results").glob("*.json")):
              with path.open() as fh:
                  results.append(json.load(fh))

          if not results:
              print("| - | no results | - | No component result artifacts were produced |")
              raise SystemExit(1)

          failed = False
          for result in results:
              repo = result["repo"]
              conclusion = result["conclusion"]
              url = result.get("url") or ""
              notes = result.get("notes") or "-"
              run = f"[run]({url})" if url else "-"
              print(f"| `{repo}` | {conclusion} | {run} | {notes} |")
              if conclusion != "success":
                  failed = True

          if failed:
              raise SystemExit(1)
          PY
