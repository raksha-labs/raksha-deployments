# Single dispatch entry point: pick one or more repo-aligned components +
# environment + optional image-tag override. This workflow looks up the
# catalog, then triggers each owning repo's deploy.yml in rollout_order.
# Use this when you want to roll selected repos instead of running each repo's
# deploy by hand.
#
# Each consumer repo's deploy.yml MUST accept three workflow_dispatch inputs:
# environment (string), image_tag (string; optional override), build_image
# (boolean). Triggering uses GitHub's REST API via gh. This workflow waits for
# every downstream deploy run and fails if any selected repo fails.

name: Dispatch deploy (components)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - dev
          - stage
          - prod
      deploy_all:
        description: Deploy all repos in catalog rollout order
        required: true
        type: boolean
        default: false
      deploy_portal:
        description: portal
        required: true
        type: boolean
        default: false
      deploy_engine:
        description: engine
        required: true
        type: boolean
        default: false
      deploy_notifier_gateway:
        description: notifier-gateway
        required: true
        type: boolean
        default: false
      deploy_ingestion_gateway:
        description: ingestion-gateway
        required: true
        type: boolean
        default: false
      deploy_simlab:
        description: simlab
        required: true
        type: boolean
        default: false
      deploy_ai_agents:
        description: ai-agents
        required: true
        type: boolean
        default: false
      image_tag:
        description: Optional image tag override. Leave empty to deploy the tags recorded in environments/<env>/services.yaml.
        required: false
        type: string
        default: ""
      build_image:
        description: Build & push images first. Requires image_tag to be set.
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  dispatch:
    name: Dispatch to consumer repos
    runs-on: ubuntu-latest

    steps:
      - name: Checkout deployments
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install pyyaml
        run: pip install pyyaml

      - name: Compute repo list (from catalog, in rollout_order)
        id: repos
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import os, yaml, json
          catalog = yaml.safe_load(open("catalog/services.yaml"))
          selected_groups = set()
          if "${{ inputs.deploy_all }}" == "true":
              selected_groups = {s["deploy_group"] for s in catalog["services"]}
          else:
              mapping = {
                  "portal": "${{ inputs.deploy_portal }}",
                  "detection": "${{ inputs.deploy_engine }}",
                  "delivery": "${{ inputs.deploy_notifier_gateway }}",
                  "ingestion": "${{ inputs.deploy_ingestion_gateway }}",
                  "simulation": "${{ inputs.deploy_simlab }}",
                  "ai-agents": "${{ inputs.deploy_ai_agents }}",
              }
              selected_groups = {group for group, enabled in mapping.items() if enabled == "true"}
          if not selected_groups:
              raise SystemExit("Select at least one component repo, or tick deploy_all.")
          services = catalog["services"]
          services = [s for s in services if s["deploy_group"] in selected_groups]
          services.sort(key=lambda s: s["rollout_order"])
          # One unique source_repo per row, preserving rollout order.
          seen, repos = set(), []
          for s in services:
              if s["source_repo"] not in seen:
                  seen.add(s["source_repo"])
                  repos.append(s["source_repo"])
          print("repos=" + json.dumps(repos))
          PY

      - name: Validate build inputs
        run: |
          set -eu
          if [ "${{ inputs.build_image }}" = "true" ] && [ -z "${{ inputs.image_tag }}" ]; then
            echo "image_tag is required when build_image=true" >&2
            exit 1
          fi

      - name: Trigger and wait for each consumer repo's deploy.yml
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_DISPATCH_TOKEN }}
        run: |
          set -eu

          wait_for_deploy() {
            repo="$1"
            marker="$2"
            echo "Waiting for raksha-labs/$repo deploy run created after $marker"

            run_id=""
            for _ in $(seq 1 30); do
              run_id=$(
                gh run list \
                  --repo "raksha-labs/$repo" \
                  --workflow deploy.yml \
                  --branch master \
                  --event workflow_dispatch \
                  --json databaseId,createdAt \
                  --limit 20 \
                | MARKER="$marker" python3 -c '
          import datetime as dt
          import json
          import os
          import sys

          marker = dt.datetime.fromisoformat(os.environ["MARKER"].replace("Z", "+00:00"))
          runs = json.load(sys.stdin)
          candidates = []
          for run in runs:
              created = dt.datetime.fromisoformat(run["createdAt"].replace("Z", "+00:00"))
              if created >= marker:
                  candidates.append((created, run["databaseId"]))
          if candidates:
              candidates.sort()
              print(candidates[0][1])
          '
              )
              if [ -n "$run_id" ]; then
                break
              fi
              sleep 10
            done

            if [ -z "$run_id" ]; then
              echo "::error::Timed out waiting for raksha-labs/$repo deploy run to appear."
              printf '| `%s` | not found | - | Timed out waiting for workflow run |\n' "$repo" >> "$GITHUB_STEP_SUMMARY"
              exit 1
            fi

            while true; do
              run_info=$(gh api "repos/raksha-labs/$repo/actions/runs/$run_id")
              parsed=$(printf '%s' "$run_info" | python3 -c '
          import json
          import sys

          run = json.load(sys.stdin)
          print(run["status"], run.get("conclusion") or "none", run["html_url"])
          ')
              set -- $parsed
              status="$1"
              conclusion="$2"
              url="$3"
              echo "raksha-labs/$repo deploy run $run_id: $status/$conclusion"

              if [ "$status" = "completed" ]; then
                if [ "$conclusion" = "success" ]; then
                  printf '| `%s` | success | [run](%s) | - |\n' "$repo" "$url" >> "$GITHUB_STEP_SUMMARY"
                  break
                fi
                printf '| `%s` | %s | [run](%s) | Downstream deploy failed |\n' "$repo" "$conclusion" "$url" >> "$GITHUB_STEP_SUMMARY"
                echo "::error::Deploy failed for raksha-labs/$repo: $url"
                exit 1
              fi
              sleep 30
            done
          }

          repos='${{ steps.repos.outputs.repos }}'
          echo "==> dispatching deploy to: $repos"
          {
            echo "## Component deploy results"
            echo
            echo "| Repo | Result | Run | Notes |"
            echo "| --- | --- | --- | --- |"
          } >> "$GITHUB_STEP_SUMMARY"

          for repo in $(echo "$repos" | python3 -c 'import json,sys; print(" ".join(json.load(sys.stdin)))'); do
            echo "→ raksha-labs/$repo"
            marker="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            gh workflow run deploy.yml \
              --repo "raksha-labs/$repo" \
              --ref master \
              -f environment='${{ inputs.environment }}' \
              -f image_tag='${{ inputs.image_tag }}' \
              -f build_image='${{ inputs.build_image }}'
            wait_for_deploy "$repo" "$marker"
          done
