# Reusable: Go CI — fmt, vet, test for one Go module.
#
# Usage:
#   jobs:
#     go:
#       uses: raksha-labs/raksha-deployments/.github/workflows/reusable-go-ci.yml@main
#       with:
#         module-path: apps/rule-control-api
#         go-version: "1.22"

name: reusable-go-ci

on:
  workflow_call:
    inputs:
      module-path:
        description: "Path (relative to repo root) of the Go module."
        type: string
        required: true
      go-version:
        type: string
        default: "1.22"
      runs-on:
        type: string
        default: ubuntu-latest

jobs:
  go:
    name: Go ${{ inputs.go-version }} (${{ inputs.module-path }})
    runs-on: ${{ inputs.runs-on }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}
          cache-dependency-path: ${{ inputs.module-path }}/go.sum

      - name: Format check
        working-directory: ${{ inputs.module-path }}
        run: |
          set -eu
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        working-directory: ${{ inputs.module-path }}
        run: go vet ./...

      - name: Build
        working-directory: ${{ inputs.module-path }}
        run: go build ./...

      - name: Test
        working-directory: ${{ inputs.module-path }}
        run: go test -race -count=1 ./...
