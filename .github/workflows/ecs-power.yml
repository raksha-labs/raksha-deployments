name: ECS power controls

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - dev
          - stage
          - prod
      action:
        description: Start, stop, or inspect selected services
        required: true
        type: choice
        options:
          - status
          - start
          - stop
      service_group:
        description: >
          Service group to target. Ignored when individual_service is set.
          live-path = ingestion-gateway, engine, notifier-runtime
          control-path = portal, admin, portal-backend, stream-control-api, rule-control-api, alert-control-api, simlab-api, agent-api, risk-monitor-api, risk-monitor-ui
          monitoring = grafana, prometheus
          tenant-tools = tenant-webhook-receiver
          all = every service across all clusters
        required: false
        type: choice
        options:
          - live-path
          - control-path
          - monitoring
          - tenant-tools
          - all
      individual_service:
        description: >
          Target a single service by short name instead of a group.
          Valid names: engine, ingestion-gateway, notifier-runtime, portal,
          admin, portal-backend, stream-control-api, rule-control-api,
          alert-control-api, simlab-api, agent-api, risk-monitor-api,
          risk-monitor-ui, grafana, prometheus, tenant-webhook-receiver
        required: false
        type: string
        default: ""
      desired_count:
        description: Desired count when starting services
        required: false
        type: choice
        options:
          - "1"
          - "2"
        default: "1"

permissions:
  id-token: write
  contents: read

jobs:
  ecs-power:
    name: ${{ inputs.action }} ${{ inputs.individual_service != '' && inputs.individual_service || inputs.service_group }} in ${{ inputs.environment }}
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_INFRA_ROLE_ARN }}
          aws-region: eu-west-1

      - name: Scale selected ECS services
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          ACTION: ${{ inputs.action }}
          SERVICE_GROUP: ${{ inputs.service_group }}
          INDIVIDUAL_SERVICE: ${{ inputs.individual_service }}
          START_DESIRED_COUNT: ${{ inputs.desired_count }}
        run: |
          set -eu

          legacy_cluster="raksha-${ENVIRONMENT}"
          runtime_cluster="raksha-${ENVIRONMENT}-runtime"
          control_cluster="raksha-${ENVIRONMENT}-control"
          tenant_cluster="tenant-webhook-receiver"

          live_services="ingestion-gateway engine notifier-runtime"
          control_services="portal admin portal-backend stream-control-api rule-control-api alert-control-api simlab-api agent-api risk-monitor-api risk-monitor-ui"
          monitoring_services="grafana prometheus"
          tenant_services="tenant-webhook-receiver"

          # Resolve full ECS service name from short name.
          # Most services follow raksha-${short_name}-${ENVIRONMENT}, but
          # monitoring and tenant-tools use different naming conventions.
          ecs_service_name() {
            local short_name="$1"
            case "$short_name" in
              grafana)                 echo "raksha-${ENVIRONMENT}-monitoring-grafana" ;;
              prometheus)              echo "raksha-${ENVIRONMENT}-monitoring-prometheus" ;;
              tenant-webhook-receiver) echo "tenant-webhook-receiver" ;;
              *)                       echo "raksha-${short_name}-${ENVIRONMENT}" ;;
            esac
          }

          # Resolve ECS cluster from short name.
          cluster_for_service() {
            local short_name="$1"
            case "$short_name" in
              tenant-webhook-receiver)
                echo "$tenant_cluster"
                ;;
              grafana|prometheus)
                if cluster_exists "$control_cluster"; then
                  echo "$control_cluster"
                else
                  echo "$legacy_cluster"
                fi
                ;;
              *)
                if echo " $live_services " | grep -q " $short_name "; then
                  if cluster_exists "$runtime_cluster"; then
                    echo "$runtime_cluster"
                  else
                    echo "$legacy_cluster"
                  fi
                else
                  if cluster_exists "$control_cluster"; then
                    echo "$control_cluster"
                  else
                    echo "$legacy_cluster"
                  fi
                fi
                ;;
            esac
          }

          cluster_exists() {
            local cluster="$1"
            aws ecs describe-clusters \
              --clusters "$cluster" \
              --query "clusters[?clusterName=='$cluster' && status=='ACTIVE'] | [0].clusterName" \
              --output text | grep -qx "$cluster"
          }

          service_exists_in_cluster() {
            local service_name="$1"
            local cluster="$2"
            aws ecs describe-services \
              --cluster "$cluster" \
              --services "$service_name" \
              --query "services[?serviceName=='$service_name' && status!='INACTIVE'] | [0].serviceName" \
              --output text | grep -qx "$service_name"
          }

          target_exists() {
            local resource_id="$1"
            aws application-autoscaling describe-scalable-targets \
              --service-namespace ecs \
              --resource-ids "$resource_id" \
              --scalable-dimension ecs:service:DesiredCount \
              --query "ScalableTargets[?ResourceId=='$resource_id'] | [0].ResourceId" \
              --output text | grep -qx "$resource_id"
          }

          set_min_capacity() {
            local resource_id="$1"
            local min_capacity="$2"
            local max_capacity

            if ! target_exists "$resource_id"; then
              echo "  autoscaling target not registered; skipping min-capacity update"
              return 0
            fi

            max_capacity="$(aws application-autoscaling describe-scalable-targets \
              --service-namespace ecs \
              --resource-ids "$resource_id" \
              --scalable-dimension ecs:service:DesiredCount \
              --query "ScalableTargets[?ResourceId=='$resource_id'] | [0].MaxCapacity" \
              --output text)"
            if [ -z "$max_capacity" ] || [ "$max_capacity" = "None" ] || [ "$max_capacity" -lt "$min_capacity" ]; then
              max_capacity="$min_capacity"
            fi

            aws application-autoscaling register-scalable-target \
              --service-namespace ecs \
              --resource-id "$resource_id" \
              --scalable-dimension ecs:service:DesiredCount \
              --min-capacity "$min_capacity" \
              --max-capacity "$max_capacity" >/dev/null
          }

          # Resolve which short service names to operate on.
          if [ -n "$INDIVIDUAL_SERVICE" ]; then
            # Validate against known services
            all_known="$live_services $control_services $monitoring_services $tenant_services"
            if ! echo " $all_known " | grep -q " $INDIVIDUAL_SERVICE "; then
              echo "::error::Unknown service '${INDIVIDUAL_SERVICE}'. Valid names: $all_known" >&2
              exit 1
            fi
            services="$INDIVIDUAL_SERVICE"
          else
            case "$SERVICE_GROUP" in
              live-path)    services="$live_services" ;;
              control-path) services="$control_services" ;;
              monitoring)   services="$monitoring_services" ;;
              tenant-tools) services="$tenant_services" ;;
              all)          services="$live_services $control_services $monitoring_services $tenant_services" ;;
              *)
                echo "::error::Unknown service_group '${SERVICE_GROUP}'." >&2
                exit 1
                ;;
            esac
          fi

          process_service() {
            local short_name="$1"
            local service_name
            local cluster
            service_name="$(ecs_service_name "$short_name")"
            cluster="$(cluster_for_service "$short_name")"

            echo "==> [$ACTION] $service_name on $cluster"

            if ! service_exists_in_cluster "$service_name" "$cluster"; then
              # Fallback to legacy cluster for non-tenant, non-monitoring services
              if [ "$cluster" != "$legacy_cluster" ] && [ "$cluster" != "$tenant_cluster" ] && \
                 service_exists_in_cluster "$service_name" "$legacy_cluster"; then
                cluster="$legacy_cluster"
                echo "  service found on legacy cluster; using $legacy_cluster"
              else
                echo "  service not found in $cluster; skipping"
                return 0
              fi
            fi

            resource_id="service/${cluster}/${service_name}"

            case "$ACTION" in
              status)
                aws ecs describe-services \
                  --cluster "$cluster" \
                  --services "$service_name" \
                  --query "services[].{service:serviceName,desired:desiredCount,running:runningCount,pending:pendingCount,rollout:deployments[0].rolloutState,taskDef:taskDefinition}" \
                  --output table
                ;;
              stop)
                set_min_capacity "$resource_id" 0
                aws ecs update-service \
                  --cluster "$cluster" \
                  --service "$service_name" \
                  --desired-count 0 \
                  --query "service.{service:serviceName,desired:desiredCount,running:runningCount,pending:pendingCount}" \
                  --output table
                ;;
              start)
                set_min_capacity "$resource_id" "$START_DESIRED_COUNT"
                aws ecs update-service \
                  --cluster "$cluster" \
                  --service "$service_name" \
                  --desired-count "$START_DESIRED_COUNT" \
                  --force-new-deployment \
                  --query "service.{service:serviceName,desired:desiredCount,running:runningCount,pending:pendingCount}" \
                  --output table
                ;;
              *)
                echo "::error::Unknown action '${ACTION}'" >&2
                exit 1
                ;;
            esac
          }

          for short_name in $services; do
            process_service "$short_name"
          done

          # Final status summary
          if [ "$ACTION" != "status" ]; then
            echo
            echo "=== Final status ==="
            for short_name in $services; do
              process_service_status() {
                local sn="$1"
                local svc cluster
                svc="$(ecs_service_name "$sn")"
                cluster="$(cluster_for_service "$sn")"
                if service_exists_in_cluster "$svc" "$cluster"; then
                  aws ecs describe-services \
                    --cluster "$cluster" --services "$svc" \
                    --query "services[].{service:serviceName,desired:desiredCount,running:runningCount,pending:pendingCount,rollout:deployments[0].rolloutState}" \
                    --output table
                fi
              }
              process_service_status "$short_name"
            done
          fi
